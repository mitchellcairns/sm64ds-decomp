# Publishes an objdiff-format progress report to decomp.dev.
#
# decomp.dev's GitHub app watches for a completed workflow run, downloads any
# artifact named "<version>-report", and parses report.json inside it. The report
# is built ROM-free from committed data: chaos_db_ci.py regenerates the same
# chaos-db.json that feeds the README bar and the treemap, then decomp_report.py
# converts it to the objdiff report schema, so the decomp.dev numbers match the
# atlas exactly.
#
# One-time setup after this lands on main: register the repo at
# https://decomp.dev/manage/new (name "Super Mario 64 DS", slug sm64ds, platform
# Nintendo DS) and install the decomp.dev GitHub app on the repo.
name: decomp.dev report

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "nearmiss/**"
      - "tools/chaos_db_ci.py"
      - "tools/decomp_report.py"
      - ".github/workflows/report.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: decomp-dev-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # chaos_db_ci.py reads git history for match authorship
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate chaos-db.json (committed data only, no ROM)
        run: python tools/chaos_db_ci.py --out chaos-db.json
      - name: Convert to objdiff report.json
        run: python tools/decomp_report.py --db chaos-db.json --out report.json
      - name: Upload report for decomp.dev
        uses: actions/upload-artifact@v4
        with:
          name: sm64ds-report
          path: report.json
          if-no-files-found: error
